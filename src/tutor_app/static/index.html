<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一步一步想一想</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Step-by-step tutor</p>
          <h1>一步一步想一想</h1>
          <p class="lead">
            把大问题拆成小台阶。孩子每答对一步，老师再带着继续；答错也不会直接给答案，而是用提示把思路慢慢点亮。
          </p>
        </div>
        <div class="hero-card">
          <div class="spark spark-a"></div>
          <div class="spark spark-b"></div>
          <p>适合问：</p>
          <ul>
            <li>数学题怎么做？</li>
            <li>作文题该怎么想？</li>
            <li>科学问题为什么会这样？</li>
          </ul>
        </div>
      </header>

      <main class="workspace">
        <section class="ask-panel card">
          <label for="questionInput">孩子想问什么？</label>
          <textarea
            id="questionInput"
            placeholder="例如：小明有 12 颗糖，分给 3 个朋友，每人几颗？"
          ></textarea>
          <div class="action-row">
            <button id="startButton">开始拆解问题</button>
            <p id="statusText" class="status-text">准备好后就可以开始。</p>
          </div>
        </section>

        <section class="lesson-grid">
          <section class="lesson-panel card">
            <div id="sessionMeta" class="session-meta hidden"></div>
            <div id="currentStep" class="current-step empty-state">
              输入一个问题后，这里会出现第一步引导。
            </div>
            <form id="answerForm" class="answer-form hidden">
              <label for="answerInput">你的答案或想法</label>
              <textarea
                id="answerInput"
                placeholder="把你的中间步骤写出来，不用担心一次答不全。"
              ></textarea>
              <button type="submit" id="answerButton">提交这一步</button>
            </form>
          </section>

          <aside class="feedback-panel card">
            <h2>学习轨迹</h2>
            <div id="timeline" class="timeline">
              <p class="empty-state">孩子的每一步尝试、提示和鼓励会显示在这里。</p>
            </div>
          </aside>
        </section>

        <section id="summaryPanel" class="summary-panel card hidden"></section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
